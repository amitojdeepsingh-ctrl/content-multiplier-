# Netlify Configuration File
# This tells Netlify how to build and deploy your app

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."transform"]
  timeout = 26

[functions."check-scheduled-posts"]
  schedule = "0 * * * *"

# Environment variables
# These are set in Netlify Dashboard, not here
# But you can add defaults for local development

[dev]
  # Local development server port
  port = 8888
  
  # Functions server port
  functionsPort = 9999

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirects for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirect for Stripe webhook (if needed)
[[redirects]]
  from = "/.netlify/functions/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true
